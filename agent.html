<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Agent</title>
</head>

<body>

<h1>صفحة الإيجنت</h1>

<div id="content"></div>

<script>
// حماية الصفحة
if (localStorage.getItem("logged_in") !== "true") {
  window.location.href = "index.html";
}

// بيانات السكربتات
const DATA = {
  version: "1.0.0",
  problems: [
    {
      name: "تأخير الطلب",
      steps: [
        {
          name: "ترحيب",
          scripts: [
            { text: "أهلًا وسهلًا", rating: 5 }
          ]
        },
        {
          name: "اعتذار",
          scripts: [
            { text: "نعتذر عن التأخير", rating: 5 }
          ]
        }
      ]
    }
  ]
};

// عرض بسيط
const el = document.getElementById("content");

DATA.problems.forEach(p => {
  const div = document.createElement("div");
  div.innerHTML = `<h3>${p.name}</h3>`;

  p.steps.forEach(s => {
    div.innerHTML += `<b>${s.name}</b><br>`;

    s.scripts.forEach(sc => {
      div.innerHTML += `${sc.text} ⭐${sc.rating}<br>`;
    });
  });

  el.appendChild(div);
});
</script>

</body>
</html>
