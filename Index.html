<!DOCTYPE html>
<html dir="rtl" lang="ar">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Center Scripts</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        margin: 0;
        padding: 0;
        color: #222;
      }

      .topbar {
        background: #1f3c88;
        color: #fff;
        padding: 14px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .topbar .title {
        font-size: 20px;
        font-weight: bold;
      }

      .topbar .meta {
        font-size: 13px;
        opacity: 0.95;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 0 16px 30px;
      }

      .card {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        padding: 18px;
        margin-bottom: 18px;
      }

      .hidden {
        display: none !important;
      }

      .grid {
        display: grid;
        grid-template-columns: 280px 1fr 1.2fr;
        gap: 16px;
      }

      .panel-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 14px;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .list button {
        border: none;
        background: #eef3ff;
        border-radius: 10px;
        padding: 12px;
        text-align: right;
        cursor: pointer;
        transition: 0.2s;
        font-size: 15px;
      }

      .list button:hover {
        background: #dce7ff;
      }

      .list button.active {
        background: #1f3c88;
        color: #fff;
      }

      .script-box {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 12px;
        background: #fafafa;
      }

      .script-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .rating {
        white-space: nowrap;
        font-size: 14px;
        color: #b7791f;
        font-weight: bold;
      }

      .script-text {
        font-size: 16px;
        line-height: 1.8;
      }

      .empty {
        color: #666;
        padding: 12px 0;
      }

      .deny {
        text-align: center;
        padding: 60px 20px;
      }

      .deny h2 {
        color: #b91c1c;
        margin-bottom: 10px;
      }

      .badge {
        display: inline-block;
        background: #eef3ff;
        color: #1f3c88;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 12px;
      }

      .update-banner {
        background: #fff7ed;
        color: #9a3412;
        border: 1px solid #fdba74;
        padding: 10px 14px;
        border-radius: 10px;
        margin-bottom: 16px;
      }

      .refresh-btn {
        border: none;
        background: #1f3c88;
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="title">نظام سكربتات الكول سنتر</div>
      <div class="meta">
        <span id="userEmail"></span>
        <span class="badge">Version: <?= appVersion ?></span>
      </div>
    </div>

    <div class="container">
      <div id="updateBanner" class="update-banner hidden">
        تم اكتشاف تحديث جديد. 
        <button class="refresh-btn" onclick="location.reload()">تحديث الآن</button>
      </div>

      <div id="approvedView" class="hidden">
        <div class="grid">
          <div class="card">
            <div class="panel-title">المشاكل</div>
            <div id="problemsList" class="list"></div>
          </div>

          <div class="card">
            <div class="panel-title">المراحل</div>
            <div id="stepsList" class="list"></div>
          </div>

          <div class="card">
            <div class="panel-title">السكربتات</div>
            <div id="scriptsContainer"></div>
          </div>
        </div>
      </div>

      <div id="deniedView" class="card deny hidden">
        <h2>غير مصرح لك بالدخول</h2>
        <p>هذا الرابط متاح فقط للمستخدمين الذين تمت الموافقة عليهم.</p>
        <p id="deniedEmail"></p>
      </div>
    </div>

    <script>
      let payload = null;
      let selectedProblemId = null;
      let selectedStepId = null;

      function stars(rating) {
        const rounded = Math.round(rating);
        return '★'.repeat(rounded) + '☆'.repeat(5 - rounded);
      }

      function renderProblems() {
        const container = document.getElementById('problemsList');
        container.innerHTML = '';

        if (!payload.data.length) {
          container.innerHTML = '<div class="empty">لا توجد مشاكل.</div>';
          return;
        }

        payload.data.forEach(problem => {
          const btn = document.createElement('button');
          btn.textContent = problem.name;
          btn.className = problem.id === selectedProblemId ? 'active' : '';
          btn.onclick = () => {
            selectedProblemId = problem.id;
            selectedStepId = problem.steps?.[0]?.id || null;
            renderAll();
          };
          container.appendChild(btn);
        });
      }

      function renderSteps() {
        const container = document.getElementById('stepsList');
        container.innerHTML = '';

        const problem = payload.data.find(p => p.id === selectedProblemId);

        if (!problem || !problem.steps.length) {
          container.innerHTML = '<div class="empty">لا توجد مراحل.</div>';
          return;
        }

        problem.steps.forEach(step => {
          const btn = document.createElement('button');
          btn.textContent = step.name;
          btn.className = step.id === selectedStepId ? 'active' : '';
          btn.onclick = () => {
            selectedStepId = step.id;
            renderAll();
          };
          container.appendChild(btn);
        });
      }

      function renderScripts() {
        const container = document.getElementById('scriptsContainer');
        container.innerHTML = '';

        const problem = payload.data.find(p => p.id === selectedProblemId);
        const step = problem?.steps.find(s => s.id === selectedStepId);

        if (!step || !step.scripts.length) {
          container.innerHTML = '<div class="empty">لا توجد سكربتات.</div>';
          return;
        }

        step.scripts.forEach(script => {
          const box = document.createElement('div');
          box.className = 'script-box';

          box.innerHTML = `
            <div class="script-header">
              <strong>${step.name}</strong>
              <div class="rating">${stars(script.rating)} (${script.rating})</div>
            </div>
            <div class="script-text">${script.text}</div>
          `;

          container.appendChild(box);
        });
      }

      function renderAll() {
        renderProblems();
        renderSteps();
        renderScripts();
      }

      function initializeUI(data) {
        payload = data;

        document.getElementById('userEmail').textContent = data.email ? `المستخدم: ${data.email}` : 'المستخدم غير معروف';

        if (!data.isApproved) {
          document.getElementById('deniedView').classList.remove('hidden');
          document.getElementById('deniedEmail').textContent = data.email ? `الإيميل الحالي: ${data.email}` : '';
          return;
        }

        document.getElementById('approvedView').classList.remove('hidden');

        if (data.data.length) {
          selectedProblemId = data.data[0].id;
          selectedStepId = data.data[0].steps?.[0]?.id || null;
        }

        renderAll();
      }

      function checkForVersionUpdate() {
        google.script.run.withSuccessHandler(function(newPayload) {
          const currentVersion = localStorage.getItem('app_version');

          if (!currentVersion) {
            localStorage.setItem('app_version', newPayload.version);
            return;
          }

          if (currentVersion !== newPayload.version) {
            localStorage.setItem('app_version', newPayload.version);
            document.getElementById('updateBanner').classList.remove('hidden');
          }
        }).getAppPayload();
      }

      function loadApp() {
        google.script.run.withSuccessHandler(function(data) {
          localStorage.setItem('app_version', data.version);
          initializeUI(data);
        }).getAppPayload();
      }

      loadApp();
      setInterval(checkForVersionUpdate, 30000);
    </script>
  </body>
</html>
